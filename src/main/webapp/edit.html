<!DOCTYPE html>
<html>
<head>
    <title>Edit Workout</title>
</head>
<body>
    <h2>Edit Workout</h2>
    <form action="WorkoutServlet" method="post">
        <input type="hidden" name="action" value="edit">
        <input type="hidden" name="id" id="id">
        <table>
            <tr>
                <td>Date:</td>
                <td><input type="date" name="workout_date" id="workout_date" required></td>
            </tr>
            <tr>
                <td>Type:</td>
                <td><input type="text" name="workout_type" id="workout_type" required></td>
            </tr>
            <tr>
                <td>Duration (minutes):</td>
                <td><input type="number" name="duration_minutes" id="duration_minutes" required></td>
            </tr>
            <tr>
                <td>Notes:</td>
                <td><textarea name="notes" id="notes"></textarea></td>
            </tr>
            <tr>
                <td colspan="2">
                    <input type="submit" value="Save Changes">
                </td>
            </tr>
        </table>
    </form>
    <br>
    <a href="WorkoutServlet">Back to List</a>

    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('id').value = params.get('id');
        document.getElementById('workout_date').value = params.get('workout_date');
        document.getElementById('workout_type').value = params.get('workout_type');
        document.getElementById('duration_minutes').value = params.get('duration_minutes');
        document.getElementById('notes').value = params.get('notes');
    </script>
</body>
</html>
